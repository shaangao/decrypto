defaults:
  - override hydra/job_logging: disabled

_target_: src.types.ExperimentConfig
num_episodes: 32
env_seed: [0,1,2]
verbose: false
baseline_data_dir: embedding_models/
exp_name: figure_4_tom_piaget
piaget: true
# fixed_interceptor: llama3.1_8B
fixed_interceptor: llama3.1_70B
# fixed_interceptor: llama3.1_70B  # eval target is the encoder so we fix the interceptor
filter_model: ""
match_encoder_decoder: true
confirm_include_api_models: true
no_error_history: true
models:

  - _target_: src.types.OpenAIModel
    model_key: gpt-4o
    model_id: gpt-4o
    use_azure: false
    # api_version: 2024-06-01
    # api_host_name: OPENAI_HOST  # Azure OpenAI host name, stored in .env file
    # api_key_name: OPENAI_PRIMARY_KEY  # OpenAI key name, stored in .env file
    api_key_name: OPENAI_API_KEY
    max_tokens: 1000
    temperature: 0.0
    use_litellm: false
    num_retries: 100
    # provider_route: "azure/"

  - _target_: src.types.AnthropicModel
    model_key: claude4.6
    model_id: claude-sonnet-4-6
    api_key_name: ANTHROPIC_API_KEY      # Anthropic key name, stored in .env file
    temperature: 0.0
    max_tokens: 4000
    max_reasoning_tokens: 1024

  - _target_: src.types.LocalModel
    model_key: llama3.1_70B
    model_id: meta-llama/Meta-Llama-3.1-70B-Instruct
    # urls:
    #     - http://localhost:8000/v1
    max_tokens: 1000
    temperature: 0.0

  - _target_: src.types.LocalModel
    model_key: llama3.1_8B
    model_id: meta-llama/Meta-Llama-3.1-8B-Instruct
    # urls:
    #     - http://localhost:8000/v1
    max_tokens: 1000
    temperature: 0.0
    
